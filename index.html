<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shell Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#game {
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  z-index: 2;
}

.ui-header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 16px 20px 0;
}

.ui-streak {
  font-size: 18px;
  font-weight: 700;
  color: #ffd700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  min-height: 22px;
}

.ui-best {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

.ui-instruction {
  font-size: 24px;
  font-weight: 800;
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  margin-top: 12px;
  text-align: center;
  min-height: 32px;
  letter-spacing: -0.3px;
  transition: opacity 0.3s;
}

.ui-cap-count {
  margin-top: auto;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* Tap targets over caps */
.tap-zone {
  position: absolute;
  pointer-events: auto;
  cursor: pointer;
  border-radius: 50%;
}
.tap-zone:active { opacity: 0.8; }

/* Game over overlay */
.gameover-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
  z-index: 10;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  gap: 14px;
  text-align: center;
  padding: 20px;
}

.go-title {
  font-size: 34px;
  font-weight: 800;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.go-best {
  font-size: 16px;
  color: rgba(255,255,255,0.7);
}

.go-best.new-record {
  font-size: 24px;
  font-weight: 800;
  color: #ffd700;
  text-shadow: 0 0 14px rgba(255,215,0,0.5);
  animation: pulse 0.6s ease-in-out 3;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

.go-btn {
  margin-top: 8px;
  padding: 16px 40px;
  font-size: 18px;
  font-weight: 700;
  color: white;
  background: linear-gradient(180deg, #4a8c3f, #357a2b);
  border: 2px solid #2d6a1e;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  font-family: inherit;
  pointer-events: auto;
}
.go-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <div class="ui-overlay" id="ui"></div>
</div>

<script>
// ── Config ──
const BEST_KEY = 'shell_game_best_v2';
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function getBest() { try { return parseInt(localStorage.getItem(BEST_KEY)||'0'); } catch { return 0; } }
function saveBest(n) { try { localStorage.setItem(BEST_KEY, String(n)); } catch {} }

// ── Difficulty ──
function getDiff(round) {
  if (round <= 1) return { numCaps: 3, numSwaps: 3, swapMs: 600, pauseMs: 200 };
  if (round === 2) return { numCaps: 3, numSwaps: 4, swapMs: 520, pauseMs: 160 };
  if (round === 3) return { numCaps: 3, numSwaps: 5, swapMs: 440, pauseMs: 140 };
  if (round === 4) return { numCaps: 3, numSwaps: 6, swapMs: 380, pauseMs: 120 };
  if (round === 5) return { numCaps: 4, numSwaps: 5, swapMs: 420, pauseMs: 140 };
  if (round === 6) return { numCaps: 4, numSwaps: 7, swapMs: 360, pauseMs: 120 };
  if (round === 7) return { numCaps: 4, numSwaps: 8, swapMs: 310, pauseMs: 100 };
  const x = round - 8;
  return { numCaps: 5, numSwaps: Math.min(9+x, 14), swapMs: Math.max(280-x*15, 180), pauseMs: Math.max(90-x*5, 50) };
}

function genSwaps(count, n) {
  const s = [];
  let last = -1;
  for (let i = 0; i < count; i++) {
    let a, b;
    do {
      a = Math.floor(Math.random()*n);
      b = Math.floor(Math.random()*(n-1));
      if (b >= a) b++;
    } while (a === last || b === last); // avoid repeating same slot
    s.push([a, b]);
    last = a; // slight variety
  }
  return s;
}

// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const gameEl = document.getElementById('game');
const uiEl = document.getElementById('ui');

let W, H, CX, CY;
function resize() {
  const r = gameEl.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  CX = W / 2; CY = H * 0.48;
}
resize();
window.addEventListener('resize', resize);

// ── Colors ── (popcorn bucket red & white stripes)

// ── Drawing functions ──

function drawGrass() {
  // Base green gradient
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#1a5c2a');
  g.addColorStop(0.3, '#2a7040');
  g.addColorStop(0.6, '#1e6030');
  g.addColorStop(1, '#154820');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Mowing stripes
  ctx.globalAlpha = 0.06;
  for (let y = 0; y < H; y += 30) {
    if ((Math.floor(y / 30) % 2) === 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, y, W, 15);
    }
  }
  ctx.globalAlpha = 1;

  // Vignette
  const vg = ctx.createRadialGradient(CX, CY, W*0.2, CX, CY, W*0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Subtle dirt circle in center
  ctx.beginPath();
  ctx.ellipse(CX, CY + 50, 120, 30, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(160, 120, 70, 0.08)';
  ctx.fill();
}

function drawBall(x, y, size) {
  ctx.save();

  // 1. Soft contact shadow directly beneath
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.85, size*0.6, size*0.15, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();

  // 2. Wider ambient shadow
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.9, size*0.9, size*0.22, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fill();

  // 3. Ball body with leather-like gradient
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  const bg = ctx.createRadialGradient(x - size*0.3, y - size*0.35, size*0.05, x + size*0.1, y + size*0.1, size*1.1);
  bg.addColorStop(0, '#fffff8');
  bg.addColorStop(0.25, '#f8f4ec');
  bg.addColorStop(0.6, '#ede6d6');
  bg.addColorStop(0.85, '#d8ceb8');
  bg.addColorStop(1, '#c0b8a4');
  ctx.fillStyle = bg;
  ctx.fill();

  // 4. Subtle outline
  ctx.strokeStyle = 'rgba(140,120,90,0.35)';
  ctx.lineWidth = size * 0.06;
  ctx.stroke();

  // 5. Left seam — tighter S-curve
  ctx.strokeStyle = '#cc1818';
  ctx.lineWidth = size * 0.09;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size*0.42, y - size*0.7);
  ctx.bezierCurveTo(x - size*0.58, y - size*0.25, x - size*0.48, y + size*0.25, x - size*0.42, y + size*0.7);
  ctx.stroke();

  // 6. Right seam — mirror S-curve
  ctx.beginPath();
  ctx.moveTo(x + size*0.42, y - size*0.7);
  ctx.bezierCurveTo(x + size*0.58, y - size*0.25, x + size*0.48, y + size*0.25, x + size*0.42, y + size*0.7);
  ctx.stroke();

  // 7-8. Stitch marks along both seams — V-shaped like real stitches
  ctx.lineWidth = size * 0.045;
  ctx.strokeStyle = '#cc1818';
  for (let i = -4; i <= 4; i++) {
    const frac = i / 4.5;
    const yy = y + frac * size * 0.7;
    const curve = Math.abs(frac);
    // Left V-stitches
    const lx = x - size*0.50 + curve * size * 0.08;
    ctx.beginPath();
    ctx.moveTo(lx - size*0.06, yy - size*0.03);
    ctx.lineTo(lx + size*0.04, yy);
    ctx.lineTo(lx - size*0.06, yy + size*0.03);
    ctx.stroke();
    // Right V-stitches
    const rx = x + size*0.50 - curve * size * 0.08;
    ctx.beginPath();
    ctx.moveTo(rx + size*0.06, yy - size*0.03);
    ctx.lineTo(rx - size*0.04, yy);
    ctx.lineTo(rx + size*0.06, yy + size*0.03);
    ctx.stroke();
  }

  // 9. Hot highlight (bright specular)
  ctx.beginPath();
  ctx.arc(x - size*0.22, y - size*0.28, size*0.13, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();

  // 10. Broader soft highlight
  ctx.beginPath();
  ctx.arc(x - size*0.15, y - size*0.22, size*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fill();

  // 11. Bottom rim shadow inside ball
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  const rimShadow = ctx.createLinearGradient(x, y + size*0.3, x, y + size);
  rimShadow.addColorStop(0, 'rgba(0,0,0,0)');
  rimShadow.addColorStop(1, 'rgba(0,0,0,0.1)');
  ctx.fillStyle = rimShadow;
  ctx.fill();

  ctx.restore();
}

function drawCap(x, y, w, _col, liftY) {
  const cy = y + liftY;
  const scale = w / 90;

  // Bucket dimensions — upside down (wide rim on ground, narrow base on top)
  const topW = 28 * scale;     // narrow top (the closed base)
  const botW = 42 * scale;     // wide bottom (the opening rim)
  const bH = 72 * scale;       // total height
  const rimH = 6 * scale;      // rim thickness
  const cornerR = 3 * scale;   // corner rounding

  ctx.save();
  ctx.translate(x, cy);

  // 1. Ground shadow — ellipse with blur feel
  const shadowY = -liftY;
  const shadowSpread = 1 + Math.abs(liftY) * 0.008;
  ctx.beginPath();
  ctx.ellipse(0, shadowY + bH*0.5 + 6, botW*1.1*shadowSpread, 14*scale*shadowSpread, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.06, 0.30 - Math.abs(liftY)*0.003)})`;
  ctx.fill();
  // 2. Tighter core shadow
  ctx.beginPath();
  ctx.ellipse(0, shadowY + bH*0.5 + 4, botW*0.8*shadowSpread, 8*scale*shadowSpread, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.04, 0.15 - Math.abs(liftY)*0.002)})`;
  ctx.fill();

  // ── Helper: bucket body path ──
  function bucketPath() {
    ctx.beginPath();
    ctx.moveTo(-topW + cornerR, -bH*0.5);
    ctx.lineTo(topW - cornerR, -bH*0.5);
    ctx.quadraticCurveTo(topW, -bH*0.5, topW + 1*scale, -bH*0.5 + cornerR);
    ctx.lineTo(botW, bH*0.5 - rimH);
    ctx.quadraticCurveTo(botW + 0.5*scale, bH*0.5 - rimH + cornerR, botW - 1*scale, bH*0.5 - rimH + cornerR);
    ctx.lineTo(-botW + 1*scale, bH*0.5 - rimH + cornerR);
    ctx.quadraticCurveTo(-botW - 0.5*scale, bH*0.5 - rimH + cornerR, -botW, bH*0.5 - rimH);
    ctx.lineTo(-topW - 1*scale, -bH*0.5 + cornerR);
    ctx.quadraticCurveTo(-topW, -bH*0.5, -topW + cornerR, -bH*0.5);
    ctx.closePath();
  }

  // 3. Bucket body — warm white base
  bucketPath();
  const bodyG = ctx.createLinearGradient(-botW, 0, botW, 0);
  bodyG.addColorStop(0, '#f0e8d8');
  bodyG.addColorStop(0.15, '#f8f2e6');
  bodyG.addColorStop(0.5, '#faf6ee');
  bodyG.addColorStop(0.85, '#f0eadc');
  bodyG.addColorStop(1, '#e4dccb');
  ctx.fillStyle = bodyG;
  ctx.fill();

  // 4-5. Red stripes — clipped to bucket, with slight gradient per stripe
  ctx.save();
  bucketPath();
  ctx.clip();

  const numStripes = 16;
  for (let i = 0; i < numStripes; i++) {
    if (i % 2 === 0) continue;
    const t1 = i / numStripes;
    const t2 = (i + 1) / numStripes;
    const tL = -topW + t1 * topW * 2;
    const tR = -topW + t2 * topW * 2;
    const bL = -botW + t1 * botW * 2;
    const bR = -botW + t2 * botW * 2;

    ctx.beginPath();
    ctx.moveTo(tL, -bH*0.5);
    ctx.lineTo(bL, bH*0.5);
    ctx.lineTo(bR, bH*0.5);
    ctx.lineTo(tR, -bH*0.5);
    ctx.closePath();

    // 6. Each stripe has a subtle horizontal gradient for roundedness
    const sg = ctx.createLinearGradient((tL+bL)/2, 0, (tR+bR)/2, 0);
    sg.addColorStop(0, '#c01030');
    sg.addColorStop(0.3, '#d81838');
    sg.addColorStop(0.5, '#e01e3e');
    sg.addColorStop(0.7, '#d81838');
    sg.addColorStop(1, '#b80e2a');
    ctx.fillStyle = sg;
    ctx.fill();
  }

  // 7. Horizontal fold/crease lines (waxed cardboard look)
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  ctx.lineWidth = 0.7 * scale;
  for (let fy = -bH*0.35; fy < bH*0.4; fy += bH*0.18) {
    const fTopW = topW + (botW - topW) * ((fy + bH*0.5) / bH);
    ctx.beginPath();
    ctx.moveTo(-fTopW, fy);
    ctx.lineTo(fTopW, fy);
    ctx.stroke();
  }

  ctx.restore(); // un-clip

  // 8. Bucket outline — darker at bottom
  bucketPath();
  ctx.strokeStyle = 'rgba(100,60,30,0.25)';
  ctx.lineWidth = 1.5 * scale;
  ctx.stroke();

  // 9-10. Left edge highlight (waxy sheen on cardboard)
  const sheenG = ctx.createLinearGradient(-botW - 2*scale, 0, -topW*0.5, 0);
  sheenG.addColorStop(0, 'rgba(255,255,255,0)');
  sheenG.addColorStop(0.5, 'rgba(255,255,255,0.14)');
  sheenG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.save();
  bucketPath();
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(-topW, -bH*0.5);
  ctx.lineTo(-botW, bH*0.5);
  ctx.lineTo(-topW*0.2, bH*0.5);
  ctx.lineTo(-topW*0.15, -bH*0.5);
  ctx.closePath();
  ctx.fillStyle = sheenG;
  ctx.fill();
  ctx.restore();

  // 11-12. Right side shadow
  const rShadG = ctx.createLinearGradient(topW*0.4, 0, botW + 2*scale, 0);
  rShadG.addColorStop(0, 'rgba(0,0,0,0)');
  rShadG.addColorStop(0.6, 'rgba(0,0,0,0.06)');
  rShadG.addColorStop(1, 'rgba(0,0,0,0.14)');
  ctx.save();
  bucketPath();
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(topW*0.15, -bH*0.5);
  ctx.lineTo(topW*0.2, bH*0.5);
  ctx.lineTo(botW + 2*scale, bH*0.5);
  ctx.lineTo(topW + 2*scale, -bH*0.5);
  ctx.closePath();
  ctx.fillStyle = rShadG;
  ctx.fill();
  ctx.restore();

  // 13-16. Rolled rim at bottom (the opening sitting on the ground)
  // Rim back (darker)
  ctx.beginPath();
  ctx.ellipse(0, bH*0.5 - rimH*0.3, botW + 2.5*scale, rimH*1.6, 0, 0, Math.PI*2);
  ctx.fillStyle = '#c8bfad';
  ctx.fill();
  // Rim front face
  ctx.beginPath();
  ctx.ellipse(0, bH*0.5 - rimH*0.1, botW + 2*scale, rimH*1.3, 0, 0, Math.PI*2);
  const rimG = ctx.createRadialGradient(0, bH*0.5, rimH*0.3, 0, bH*0.5, botW + 4*scale);
  rimG.addColorStop(0, '#e8e0d0');
  rimG.addColorStop(0.5, '#ddd5c2');
  rimG.addColorStop(1, '#c5bca8');
  ctx.fillStyle = rimG;
  ctx.fill();
  // Rim highlight
  ctx.beginPath();
  ctx.ellipse(0, bH*0.5 - rimH*0.5, botW + 1*scale, rimH*0.7, 0, Math.PI*1.1, Math.PI*1.9);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.2 * scale;
  ctx.stroke();
  // Rim outline
  ctx.beginPath();
  ctx.ellipse(0, bH*0.5 - rimH*0.1, botW + 2*scale, rimH*1.3, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(80,50,20,0.18)';
  ctx.lineWidth = 0.8 * scale;
  ctx.stroke();
  // Inner darkness (the opening)
  ctx.beginPath();
  ctx.ellipse(0, bH*0.5, botW - 2*scale, rimH*0.7, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fill();

  // 17-19. Flat base on top (the closed bottom, facing up)
  ctx.beginPath();
  ctx.ellipse(0, -bH*0.5, topW + 0.5*scale, 6.5*scale, 0, 0, Math.PI*2);
  const baseG = ctx.createRadialGradient(-3*scale, -bH*0.5 - 1*scale, 2*scale, 0, -bH*0.5, topW);
  baseG.addColorStop(0, '#f0e8d8');
  baseG.addColorStop(0.6, '#e0d8c6');
  baseG.addColorStop(1, '#d0c8b4');
  ctx.fillStyle = baseG;
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,50,20,0.15)';
  ctx.lineWidth = 0.8 * scale;
  ctx.stroke();
  // Base highlight
  ctx.beginPath();
  ctx.ellipse(-4*scale, -bH*0.5, topW*0.4, 2.5*scale, -0.15, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();

  // 20-26. "POPCORN" text band — upside down since bucket is flipped
  const bandY = bH*0.08;
  const bandH = 13 * scale;
  const bandTopW = topW + (botW - topW) * 0.55;
  const bandBotW = topW + (botW - topW) * 0.62;

  // Band background
  ctx.beginPath();
  ctx.moveTo(-bandTopW, bandY - bandH/2);
  ctx.lineTo(-bandBotW, bandY + bandH/2);
  ctx.lineTo(bandBotW, bandY + bandH/2);
  ctx.lineTo(bandTopW, bandY - bandH/2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fill();
  // Band border lines
  ctx.strokeStyle = 'rgba(200,20,50,0.25)';
  ctx.lineWidth = 0.6 * scale;
  ctx.beginPath();
  ctx.moveTo(-bandTopW, bandY - bandH/2);
  ctx.lineTo(bandTopW, bandY - bandH/2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-bandBotW, bandY + bandH/2);
  ctx.lineTo(bandBotW, bandY + bandH/2);
  ctx.stroke();

  // POPCORN text — flipped upside down
  ctx.save();
  ctx.translate(0, bandY + 0.5*scale);
  ctx.rotate(Math.PI); // flip 180°
  ctx.fillStyle = '#c01030';
  ctx.font = `900 ${9.5*scale}px 'Arial Black', 'Impact', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('POPCORN', 0, 0);
  // Text shadow for depth
  ctx.fillStyle = 'rgba(80,0,10,0.15)';
  ctx.fillText('POPCORN', 0.5*scale, 0.5*scale);
  ctx.restore();

  // 27-30. Decorative dots/stars above and below text band
  ctx.fillStyle = 'rgba(200,20,50,0.3)';
  for (const dy of [-bandH/2 - 4*scale, bandH/2 + 4*scale]) {
    for (let dx = -bandTopW*0.7; dx <= bandTopW*0.7; dx += 8*scale) {
      ctx.beginPath();
      ctx.arc(dx, bandY + dy, 1*scale, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // 31-34. Vertical ribs (structural rigidity lines on cardboard)
  ctx.save();
  bucketPath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.025)';
  ctx.lineWidth = 1.2 * scale;
  for (let ri = 0; ri < numStripes; ri++) {
    if (ri % 2 !== 0) continue; // only on white stripes
    const t = (ri + 0.5) / numStripes;
    const tx = -topW + t * topW * 2;
    const bx = -botW + t * botW * 2;
    ctx.beginPath();
    ctx.moveTo(tx, -bH*0.5);
    ctx.lineTo(bx, bH*0.5);
    ctx.stroke();
  }
  ctx.restore();

  // 35-38. Waxy sheen — curved highlight on the front face
  ctx.save();
  bucketPath();
  ctx.clip();
  const frontSheen = ctx.createLinearGradient(0, -bH*0.5, 0, bH*0.2);
  frontSheen.addColorStop(0, 'rgba(255,255,255,0.08)');
  frontSheen.addColorStop(0.4, 'rgba(255,255,255,0.04)');
  frontSheen.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = frontSheen;
  ctx.beginPath();
  ctx.moveTo(-topW*0.6, -bH*0.5);
  ctx.lineTo(-botW*0.3, bH*0.3);
  ctx.lineTo(botW*0.1, bH*0.3);
  ctx.lineTo(topW*0.2, -bH*0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 39-41. Bottom edge ambient occlusion (where bucket meets ground)
  if (liftY >= -2) {
    ctx.beginPath();
    ctx.ellipse(0, bH*0.5 + 2*scale, botW*0.9, 3*scale, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fill();
  }

  // 42-44. Top edge subtle inner shadow
  ctx.save();
  bucketPath();
  ctx.clip();
  const topInner = ctx.createLinearGradient(0, -bH*0.5, 0, -bH*0.35);
  topInner.addColorStop(0, 'rgba(0,0,0,0.06)');
  topInner.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topInner;
  ctx.fillRect(-topW - 2*scale, -bH*0.5, (topW + 2*scale)*2, bH*0.15);
  ctx.restore();

  // 45-47. Rim contact shadow at bottom of bucket body
  ctx.beginPath();
  ctx.moveTo(-botW, bH*0.5 - rimH*1.2);
  ctx.lineTo(botW, bH*0.5 - rimH*1.2);
  ctx.lineTo(botW, bH*0.5 - rimH*0.5);
  ctx.lineTo(-botW, bH*0.5 - rimH*0.5);
  ctx.closePath();
  const contactG = ctx.createLinearGradient(0, bH*0.5 - rimH*1.2, 0, bH*0.5 - rimH*0.5);
  contactG.addColorStop(0, 'rgba(0,0,0,0)');
  contactG.addColorStop(1, 'rgba(0,0,0,0.04)');
  ctx.fillStyle = contactG;
  ctx.fill();

  // 48-50. Extra stripe edge definition — thin dark lines between stripe transitions
  ctx.save();
  bucketPath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 0.5 * scale;
  for (let i = 1; i < numStripes; i++) {
    const t = i / numStripes;
    const tx = -topW + t * topW * 2;
    const bx = -botW + t * botW * 2;
    ctx.beginPath();
    ctx.moveTo(tx, -bH*0.5);
    ctx.lineTo(bx, bH*0.5);
    ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

// ── Game state ──
let state = {};
let bestStreak = getBest();
let animFrame;

function slotX(slot, numCaps) {
  const spacing = Math.min(W * 0.22, 100);
  const totalW = (numCaps - 1) * spacing;
  return CX - totalW/2 + slot * spacing;
}

const CAP_W = 90;
const BALL_R = 12;

// ── Easing ──
function easeInOut(t) {
  return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
}

// ── State machine ──
// Phases: reveal, covering, shuffling, picking, revealing, gameover

function startRound(round, streak) {
  const diff = getDiff(round);
  state = {
    round, streak, diff,
    phase: 'reveal',
    numCaps: diff.numCaps,
    // capSlots[i] = which slot cap i is in
    capSlots: Array.from({length: diff.numCaps}, (_,i) => i),
    ballUnder: Math.floor(Math.random() * diff.numCaps), // which cap index has the ball
    liftAmounts: new Array(diff.numCaps).fill(0), // per cap lift (for reveal)
    ballVisible: true,
    swaps: genSwaps(diff.numSwaps, diff.numCaps),
    swapIndex: 0,
    swapProgress: 0, // 0-1 for current swap animation
    swapStartTime: 0,
    pickedSlot: null,
    revealOrder: [],
    revealIndex: 0,
    revealTimer: 0,
    phaseTimer: 0,
    startTime: performance.now(),
  };

  // Lift the cap that has the ball to show it
  state.liftAmounts[state.ballUnder] = -60;
  state.phaseTimer = performance.now() + 1400; // show ball for 1.4s

  updateUI();
}

function updateUI() {
  const s = state;
  let instr = '';
  if (s.phase === 'reveal' || s.phase === 'covering') instr = 'Watch the ball\u2026';
  else if (s.phase === 'shuffling') instr = 'Follow the bucket\u2026';
  else if (s.phase === 'picking') instr = 'Where\u2019s the ball?';
  else if (s.phase === 'revealing') instr = s.pickedSlot === s.capSlots[s.ballUnder] ? '&#x2705; Yes!' : '&#x274C; Nope!';
  else if (s.phase === 'gameover') instr = '';

  let streakHtml = s.streak > 0 ? `<span class="ui-streak">${s.streak} in a row</span>` : '';

  let html = `
    <div class="ui-header">
      <div>${streakHtml}</div>
      <div class="ui-best">Best: ${bestStreak}</div>
    </div>
    <div class="ui-instruction">${instr}</div>`;

  if (s.numCaps > 3 && s.phase !== 'gameover') {
    html += `<div class="ui-cap-count">${s.numCaps} buckets</div>`;
  }

  uiEl.innerHTML = html;

  // Add tap zones during picking phase
  if (s.phase === 'picking') {
    for (let slot = 0; slot < s.numCaps; slot++) {
      const x = slotX(slot, s.numCaps);
      const zone = document.createElement('div');
      zone.className = 'tap-zone';
      const zw = CAP_W * 1.1;
      const zh = CAP_W * 1.6; // taller for bucket shape
      zone.style.width = zw + 'px';
      zone.style.height = zh + 'px';
      zone.style.left = (x - zw/2) + 'px';
      zone.style.top = (CY - zh*0.55) + 'px';
      zone.style.borderRadius = '8px';
      zone.dataset.slot = slot;
      zone.addEventListener('click', () => handlePick(slot));
      uiEl.appendChild(zone);
    }
  }
}

function handlePick(slot) {
  if (state.phase !== 'picking') return;
  state.phase = 'revealing';
  state.pickedSlot = slot;

  // Build reveal order: wrong caps first, then the picked one / ball one last
  const ballSlot = state.capSlots[state.ballUnder];
  const correct = slot === ballSlot;
  const allSlots = Array.from({length: state.numCaps}, (_,i) => i);

  // Find cap indices at each slot for lifting
  const wrongSlots = allSlots.filter(s => s !== ballSlot && s !== slot);

  if (correct) {
    // Lift wrong caps first, then the correct one
    state.revealOrder = [...wrongSlots, slot];
  } else {
    // Lift other wrong caps, then picked (wrong), then ball cap
    const otherWrong = wrongSlots.filter(s => s !== slot);
    state.revealOrder = [...otherWrong, slot, ballSlot];
  }

  state.revealIndex = 0;
  state.revealTimer = performance.now() + 400;
  updateUI();
}

function showGameover() {
  state.phase = 'gameover';
  bestStreak = Math.max(bestStreak, state.streak);
  saveBest(bestStreak);

  const isNew = state.streak > 0 && state.streak >= bestStreak;

  let html = `<div class="gameover-overlay">
    <div class="go-title">${state.streak === 0 ? 'Not this time!' : state.streak + ' in a row!'}</div>
    ${state.streak > 0 ? `<div class="go-best ${isNew ? 'new-record' : ''}">${isNew ? 'NEW RECORD!' : 'Best: ' + bestStreak}</div>` : ''}
    <button class="go-btn" id="go-btn">Play Again</button>
  </div>`;

  uiEl.innerHTML = html;
  document.getElementById('go-btn').addEventListener('click', () => startRound(1, 0));
}

// ── Animation loop ──
function frame(now) {
  animFrame = requestAnimationFrame(frame);
  const s = state;
  if (!s.phase) return;

  // ── Phase transitions ──
  if (s.phase === 'reveal' && now >= s.phaseTimer) {
    // Start covering — lower the lifted cap
    s.phase = 'covering';
    s.phaseTimer = now + 450;
  }

  if (s.phase === 'covering') {
    // Animate cap down
    const t = 1 - Math.max(0, (s.phaseTimer - now) / 450);
    s.liftAmounts[s.ballUnder] = -60 * (1 - easeInOut(t));
    if (t >= 1) {
      s.liftAmounts[s.ballUnder] = 0;
      s.ballVisible = false;
      s.phase = 'shuffling';
      s.swapIndex = 0;
      s.swapStartTime = now + 300; // brief pause before shuffling
      s.swapProgress = 0;
    }
  }

  if (s.phase === 'shuffling') {
    if (s.swapIndex >= s.swaps.length) {
      // Done shuffling
      s.phase = 'picking';
      updateUI();
    } else if (now >= s.swapStartTime) {
      const elapsed = now - s.swapStartTime;
      s.swapProgress = Math.min(elapsed / s.diff.swapMs, 1);
    }

    // Check if current swap is done
    if (s.swapProgress >= 1 && s.swapIndex < s.swaps.length) {
      // Commit the swap
      const [a, b] = s.swaps[s.swapIndex];
      const capA = s.capSlots.indexOf(a);
      const capB = s.capSlots.indexOf(b);
      if (capA !== -1) s.capSlots[capA] = b;
      if (capB !== -1) s.capSlots[capB] = a;

      s.swapIndex++;
      s.swapProgress = 0;
      s.swapStartTime = now + s.diff.pauseMs;
    }
  }

  if (s.phase === 'revealing' && now >= s.revealTimer) {
    if (s.revealIndex < s.revealOrder.length) {
      // Lift next cap
      const revealSlot = s.revealOrder[s.revealIndex];
      // Find which cap is at this slot
      const capIdx = s.capSlots.indexOf(revealSlot);
      if (capIdx !== -1) s.liftAmounts[capIdx] = -55;
      s.ballVisible = true; // show ball once caps start lifting

      s.revealIndex++;
      // Longer pause for the last reveal (the answer)
      const isLast = s.revealIndex >= s.revealOrder.length;
      s.revealTimer = now + (isLast ? 1200 : 500);
    } else {
      // All revealed — decide outcome
      const correct = s.pickedSlot === s.capSlots[s.ballUnder];
      if (correct) {
        const newStreak = s.streak + 1;
        bestStreak = Math.max(bestStreak, newStreak);
        saveBest(bestStreak);
        setTimeout(() => startRound(s.round + 1, newStreak), 600);
      } else {
        setTimeout(showGameover, 400);
      }
    }
  }

  // ── Draw ──
  drawGrass();

  // Compute cap positions (with swap animation)
  const positions = []; // {x, y, capIdx, liftY}
  for (let i = 0; i < s.numCaps; i++) {
    let slot = s.capSlots[i];
    let x = slotX(slot, s.numCaps);
    let arcY = 0;

    // If this cap is being swapped right now, interpolate
    if (s.phase === 'shuffling' && s.swapIndex < s.swaps.length) {
      const [a, b] = s.swaps[s.swapIndex];
      if (slot === a || slot === b) {
        const targetSlot = slot === a ? b : a;
        const fromX = slotX(slot, s.numCaps);
        const toX = slotX(targetSlot, s.numCaps);
        const t = easeInOut(s.swapProgress);
        x = fromX + (toX - fromX) * t;

        // Arc: one cap goes over, one goes under
        const isFirst = slot === a;
        const arcHeight = 35 + Math.abs(toX - fromX) * 0.15;
        if (isFirst) {
          // Arc up and over
          arcY = -arcHeight * Math.sin(t * Math.PI);
        } else {
          // Slight dip under
          arcY = arcHeight * 0.2 * Math.sin(t * Math.PI);
        }
      }
    }

    positions.push({ x, y: CY + arcY, capIdx: i, liftY: s.liftAmounts[i] });
  }

  // Sort by y so caps in back draw first (crude depth sort)
  positions.sort((a, b) => (a.y + a.liftY) - (b.y + b.liftY));

  // Draw ball under the correct cap's position
  if (s.ballVisible) {
    const ballCap = positions.find(p => p.capIdx === s.ballUnder);
    if (ballCap) {
      drawBall(ballCap.x, ballCap.y + 30, BALL_R);
    }
  }

  // Draw caps
  for (const p of positions) {
    // Glow effect during picking phase
    if (s.phase === 'picking') {
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + p.liftY, CAP_W*0.5, CAP_W*0.2, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255, 215, 0, 0.08)';
      ctx.fill();
      ctx.restore();
    }

    // Highlight picked bucket during reveal
    if (s.phase === 'revealing' && s.pickedSlot === s.capSlots[p.capIdx]) {
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, CAP_W*0.55, CAP_W*0.25, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255, 215, 0, 0.12)';
      ctx.fill();
      ctx.restore();
    }

    drawCap(p.x, p.y, CAP_W, null, p.liftY);
  }
}

// ── Start ──
startRound(1, 0);
animFrame = requestAnimationFrame(frame);
</script>
</body>
</html>
